# Nord theme for Rust Terminus

[theme]
name = "nord"
background = "#2e3440"
foreground = "#d8dee9"

[theme.cursor]
text = "#2e3440"
cursor = "#d8dee9"

[theme.normal]
black = "#3b4252"
red = "#bf616a"
green = "#a3be8c"
yellow = "#ebcb8b"
blue = "#5e81ac"
magenta = "#b48ead"
cyan = "#88c0d0"
white = "#e5e9f0"

[theme.bright]
black = "#4c566a"
red = "#bf616a"
green = "#a3be8c"
yellow = "#ebcb8b"
blue = "#81a1c1"
magenta = "#b48ead"
cyan = "#8fbcbb"
white = "#eceff4"

[theme.selection]
text = "#ffffff"
background = "#434c5e"
